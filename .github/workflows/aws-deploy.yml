name: AWS Deploy ApplyDF

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
  ECR_REPOSITORY_BACKEND: ${{ vars.ECR_REPOSITORY_BACKEND }}
  ECR_REPOSITORY_FRONTEND: ${{ vars.ECR_REPOSITORY_FRONTEND }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-applydf-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          set -euo pipefail
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY_BACKEND" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$ECR_REPOSITORY_BACKEND" >/dev/null
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY_FRONTEND" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$ECR_REPOSITORY_FRONTEND" >/dev/null

      - name: Build and push Docker images
        id: build
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA::12}"
          BACKEND_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG"
          FRONTEND_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG"

          docker build -f backend/Dockerfile -t "$BACKEND_IMAGE" .
          docker build -f frontend/Dockerfile -t "$FRONTEND_IMAGE" .

          docker push "$BACKEND_IMAGE"
          docker push "$FRONTEND_IMAGE"

          echo "backend_image=$BACKEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=$ECR_REGISTRY" >> "$GITHUB_OUTPUT"

      - name: Copy deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "deploy/docker-compose.aws.yml,deploy/ec2-deploy.sh"
          target: "/opt/applydf"
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.build.outputs.ecr_registry }}
          BACKEND_IMAGE: ${{ steps.build.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ steps.build.outputs.frontend_image }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,BACKEND_IMAGE,FRONTEND_IMAGE
          script: |
            chmod +x /opt/applydf/deploy/ec2-deploy.sh || true
            chmod +x /opt/applydf/ec2-deploy.sh || true
            if [ -f /opt/applydf/ec2-deploy.sh ]; then
              /opt/applydf/ec2-deploy.sh
            else
              /opt/applydf/deploy/ec2-deploy.sh
            fi
