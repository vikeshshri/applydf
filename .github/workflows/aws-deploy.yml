name: AWS Deploy ApplyDF

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY_BACKEND: ${{ vars.ECR_REPOSITORY_BACKEND }}
  ECR_REPOSITORY_FRONTEND: ${{ vars.ECR_REPOSITORY_FRONTEND }}
  ECS_TASK_FAMILY: applydf-backend

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          set -euo pipefail
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY_BACKEND" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$ECR_REPOSITORY_BACKEND" >/dev/null
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY_FRONTEND" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$ECR_REPOSITORY_FRONTEND" >/dev/null

      - name: Build and push Docker images
        id: build
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA::12}"
          BACKEND_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG"
          FRONTEND_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG"

          docker build -f backend/Dockerfile -t "$BACKEND_IMAGE" .
          docker build -f frontend/Dockerfile -t "$FRONTEND_IMAGE" .

          docker push "$BACKEND_IMAGE"
          docker push "$FRONTEND_IMAGE"

          echo "backend_image=$BACKEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=$ECR_REGISTRY" >> "$GITHUB_OUTPUT"

      - name: Update ECS task definition and deploy
        env:
          IMAGE_URI: ${{ steps.build.outputs.backend_image }}
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_FAMILY" \
            --query 'taskDefinition' \
            --output json)

          # Update image in container definitions
          echo "$TASK_DEF" | jq --arg IMAGE "$IMAGE_URI" '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' > /tmp/task-def.json

          # Register new task definition
          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Update service with new task definition
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --service "${{ vars.ECS_SERVICE_NAME }}" \
            --task-definition "$NEW_TASK_ARN" \
            --force-new-deployment

      - name: Wait for ECS deployment stabilization
        run: |
          CLUSTER="${{ vars.ECS_CLUSTER_NAME }}"
          SERVICE="${{ vars.ECS_SERVICE_NAME }}"
          echo "Waiting for ECS service deployment to stabilize..."
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"
          echo "ECS deployment stabilized."
