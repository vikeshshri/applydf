name: AWS Infra Bootstrap

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        type: choice
        options: [plan, apply]
        default: plan
      environment:
        description: Target environment label
        type: choice
        options: [staging, production]
        default: production

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      TF_IN_AUTOMATION: true
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD || secrets.DATABASE_PASSWORD }}
    defaults:
      run:
        working-directory: deploy/aws/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Validate required secrets
        run: |
          if [ -z "${TF_VAR_db_password}" ]; then
            echo "Missing DB password. Set environment secret DB_PASSWORD or DATABASE_PASSWORD."
            exit 1
          fi

      - name: Terraform Plan
        run: terraform plan -input=false -lock-timeout=5m -var-file=terraform.tfvars -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve tfplan
