name: AWS Infra Bootstrap

on:
  workflow_dispatch:
    inputs:
      ensure_ecr:
        description: "Create ECR repositories if missing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: deploy/aws/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: deploy/aws/terraform
        run: terraform plan -input=false -var="aws_region=ap-south-1" -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" -var="ecr_backend_repository=${{ vars.ECR_REPOSITORY_BACKEND }}" -var="ecr_frontend_repository=${{ vars.ECR_REPOSITORY_FRONTEND }}" -var="ecs_cluster_name=${{ vars.ECS_CLUSTER_NAME }}" -var="ecs_service_name=${{ vars.ECS_SERVICE_NAME }}" -var="vpc_cidr=10.40.0.0/16" -var="public_subnet_cidrs=[\"10.40.1.0/24\", \"10.40.2.0/24\"]" -var="private_app_subnet_cidrs=[\"10.40.11.0/24\", \"10.40.12.0/24\"]" -var="db_name=${{ vars.DB_NAME }}" -var="db_user=${{ secrets.DB_USER }}" -var="db_password=${{ secrets.DB_PASSWORD }}" -var="domain_name=${{ vars.DOMAIN_NAME }}"

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch'
        working-directory: deploy/aws/terraform
        run: terraform apply -input=false -auto-approve -var="aws_region=ap-south-1" -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" -var="ecr_backend_repository=${{ vars.ECR_REPOSITORY_BACKEND }}" -var="ecr_frontend_repository=${{ vars.ECR_REPOSITORY_FRONTEND }}" -var="ecs_cluster_name=${{ vars.ECS_CLUSTER_NAME }}" -var="ecs_service_name=${{ vars.ECS_SERVICE_NAME }}" -var="vpc_cidr=10.40.0.0/16" -var="public_subnet_cidrs=[\"10.40.1.0/24\", \"10.40.2.0/24\"]" -var="private_app_subnet_cidrs=[\"10.40.11.0/24\", \"10.40.12.0/24\"]" -var="db_name=${{ vars.DB_NAME }}" -var="db_user=${{ secrets.DB_USER }}" -var="db_password=${{ secrets.DB_PASSWORD }}" -var="domain_name=${{ vars.DOMAIN_NAME }}"

      - name: Print next-step checklist
        shell: bash
        run: |
          echo "Infra bootstrap completed."
          echo "Next: run AWS Deploy ApplyDF workflow (push to main or workflow_dispatch)."
          echo "Required secrets now only: EC2_HOST, EC2_USER, EC2_SSH_PRIVATE_KEY"
