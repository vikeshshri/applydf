name: AWS Infra Init (One-Time)

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        required: true
        default: ap-south-1
        type: string
      role_name:
        description: IAM role name for GitHub OIDC
        required: true
        default: github-actions-applydf
        type: string
      ecr_backend_repo:
        description: ECR backend repository name
        required: true
        default: applydf-backend
        type: string
      ecr_frontend_repo:
        description: ECR frontend repository name
        required: true
        default: applydf-frontend
        type: string

permissions:
  contents: read

jobs:
  init:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials (bootstrap keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Ensure GitHub OIDC Provider exists
        shell: bash
        run: |
          set -euo pipefail
          EXISTING=$(aws iam list-open-id-connect-providers --query "OpenIDConnectProviderList[?contains(Arn, 'token.actions.githubusercontent.com')].Arn" --output text || true)
          if [ -z "$EXISTING" ]; then
            aws iam create-open-id-connect-provider \
              --url https://token.actions.githubusercontent.com \
              --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1 \
              --client-id-list sts.amazonaws.com >/dev/null
            echo "Created GitHub OIDC provider"
          else
            echo "GitHub OIDC provider already exists"
          fi

      - name: Create/Update IAM role for GitHub OIDC deploy
        shell: bash
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ROLE_NAME="${{ inputs.role_name }}"
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}"

          cat > trust-policy.json <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                  },
                  "StringLike": {
                    "token.actions.githubusercontent.com:sub": "repo:${{ github.repository }}:*"
                  }
                }
              }
            ]
          }
          EOF

          if aws iam get-role --role-name "$ROLE_NAME" >/dev/null 2>&1; then
            aws iam update-assume-role-policy --role-name "$ROLE_NAME" --policy-document file://trust-policy.json
            echo "Updated role trust policy: $ROLE_NAME"
          else
            aws iam create-role --role-name "$ROLE_NAME" --assume-role-policy-document file://trust-policy.json >/dev/null
            echo "Created role: $ROLE_NAME"
          fi

          cat > ecr-policy.json <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": [
                  "ecr:GetAuthorizationToken",
                  "ecr:BatchCheckLayerAvailability",
                  "ecr:CompleteLayerUpload",
                  "ecr:UploadLayerPart",
                  "ecr:InitiateLayerUpload",
                  "ecr:PutImage",
                  "ecr:DescribeRepositories",
                  "ecr:CreateRepository"
                ],
                "Resource": "*"
              }
            ]
          }
          EOF

          aws iam put-role-policy --role-name "$ROLE_NAME" --policy-name applydf-ecr-deploy-policy --policy-document file://ecr-policy.json

          echo "AWS_DEPLOY_ROLE_ARN=${ROLE_ARN}" >> "$GITHUB_ENV"

      - name: Ensure ECR repositories exist
        shell: bash
        run: |
          set -euo pipefail
          aws ecr describe-repositories --repository-names "${{ inputs.ecr_backend_repo }}" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "${{ inputs.ecr_backend_repo }}" >/dev/null

          aws ecr describe-repositories --repository-names "${{ inputs.ecr_frontend_repo }}" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "${{ inputs.ecr_frontend_repo }}" >/dev/null

      - name: Print GitHub Variable values to set
        shell: bash
        run: |
          set -euo pipefail
          echo "Set these GitHub Variables:"
          echo "AWS_REGION=${{ inputs.aws_region }}"
          echo "AWS_DEPLOY_ROLE_ARN=${AWS_DEPLOY_ROLE_ARN}"
          echo "ECR_REPOSITORY_BACKEND=${{ inputs.ecr_backend_repo }}"
          echo "ECR_REPOSITORY_FRONTEND=${{ inputs.ecr_frontend_repo }}"

          {
            echo "### AWS Infra Init Output"
            echo ""
            echo "Use these in GitHub Variables:"
            echo "- AWS_REGION=${{ inputs.aws_region }}"
            echo "- AWS_DEPLOY_ROLE_ARN=${AWS_DEPLOY_ROLE_ARN}"
            echo "- ECR_REPOSITORY_BACKEND=${{ inputs.ecr_backend_repo }}"
            echo "- ECR_REPOSITORY_FRONTEND=${{ inputs.ecr_frontend_repo }}"
            echo ""
            echo "Then run workflow: AWS Deploy ApplyDF"
          } >> "$GITHUB_STEP_SUMMARY"
